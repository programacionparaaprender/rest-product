# =========================================================================
# CONFIGURACI�N ORIGINAL DE QUARKUS
# =========================================================================
quarkus.http.port=8765
greeting=Hello Dear:
#quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.database.generation=update

# Swagger / OpenAPI (Quarkus utiliza por defecto /q/swagger-ui, pero aqu� se fuerza la ruta)
quarkus.swagger-ui.path=swaggerui
mp.openapi.extensions.smallrye.info.title=Example API
%dev.mp.openapi.extensions.smallrye.info.title=Example API (development)
%test.mp.openapi.extensions.smallrye.info.title=Example API (test)
mp.openapi.extensions.smallrye.info.version=1.0.1
mp.openapi.extensions.smallrye.info.description=Just an example service
mp.openapi.extensions.smallrye.info.termsOfService=Your terms here
mp.openapi.extensions.smallrye.info.contact.email=techsupport@example.com
mp.openapi.extensions.smallrye.info.contact.name=Example API Support
mp.openapi.extensions.smallrye.info.contact.url=http://exampleurl.com/contact
mp.openapi.extensions.smallrye.info.license.name=Apache 2.0
mp.openapi.extensions.smallrye.info.license.url=https://www.apache.org/licenses/LICENSE-2.0.html

# =========================================================================
# MIGRACI�N DESDE SPRING BOOT A QUARKUS
# =========================================================================

# Nombre de la aplicaci�n (Equivalente a spring.application.name)
quarkus.application.name=ms-payments-paypal-rest

# Base de Datos PostgreSQL (Equivalente a Agroal/JDBC en Quarkus)
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=sa
quarkus.datasource.password=123
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5434/user_db

# Reactive SQL (Equivalente a Spring R2DBC si usas la extensi�n reactiva de Postgres)
quarkus.datasource.reactive.url=postgresql://localhost:5434/user_db

# Inicializaci�n de SQL (Equivalente a spring.sql.init.mode=always)
# Quarkus ejecuta el archivo 'import.sql' en la ra�z de resources autom�ticamente si esta propiedad est� activa
quarkus.hibernate-orm.sql-load-script=import.sql

# GraphQL (Equivalente a Spring GraphQL mediante la extensi�n SmallRye GraphQL)
quarkus.smallrye-graphql.ui.enable=true
quarkus.smallrye-graphql.ui.path=/graphiql
quarkus.smallrye-graphql.path=/graphql

# Logs (Equivalente a logging.level)
quarkus.log.level=INFO
quarkus.log.category="io.quarkus".level=DEBUG
quarkus.log.category="io.smallrye.graphql".level=DEBUG

# =========================================================================
# CONFIGURACI�N DE MICROPROFILE FAULT TOLERANCE
# =========================================================================

# Configuraciones para ResilientAppController
mp.fault-tolerance.org.programacionparaaprender.quarkus.starting.ResilientAppController/circuitBreaker/CircuitBreaker/requestVolumeThreshold=4
mp.fault-tolerance.org.programacionparaaprender.quarkus.starting.ResilientAppController/bulkheadApi/Bulkhead/value=5
mp.fault-tolerance.org.programacionparaaprender.quarkus.starting.ResilientAppController/retryApi/Retry/maxRetries=3

# Configuraciones para ExternalAPICaller
mp.fault-tolerance.org.programacionparaaprender.quarkus.starting.ExternalAPICaller/callApi/CircuitBreaker/requestVolumeThreshold=4
mp.fault-tolerance.org.programacionparaaprender.quarkus.starting.ExternalAPICaller/callApi/CircuitBreaker/failureRatio=0.5
mp.fault-tolerance.org.programacionparaaprender.quarkus.starting.ExternalAPICaller/callApi/CircuitBreaker/delay=5000
mp.fault-tolerance.org.programacionparaaprender.quarkus.starting.ExternalAPICaller/callApi/CircuitBreaker/delayUnit=Millis

# =========================================================================
# CONFIGURACI�N DE REACTIVE MESSAGING (MIGRACI�N SPRING CLOUD STREAM)
# =========================================================================

# Configuraci�n para el Consumidor (pageEventConsumer)
# El nombre del canal 'page-events-in' debe coincidir con @Incoming en PageEventService
mp.messaging.incoming.page-events-in.connector=smallrye-kafka
mp.messaging.incoming.page-events-in.topic=T4
mp.messaging.incoming.page-events-in.group.id=page-event-group

# Configuraci�n para el Productor (Si se habilita pageEventSupplier/Producer)
mp.messaging.outgoing.page-events-out.connector=smallrye-kafka
mp.messaging.outgoing.page-events-out.topic=T4

# =========================================================================
# SOLUCI�N AL ERROR DE DOCKER (DESACTIVAR DEV SERVICES)
# =========================================================================
# Apaga el levantamiento autom�tico de contenedores para evitar fallos de Testcontainers en Eclipse
quarkus.kafka.devservices.enabled=false
quarkus.datasource.devservices=false

# =========================================================================
# CONFIGURACIÓN DE CORS (MIGRACIÓN DESDE SPRING BOOT)
# =========================================================================
# Esta es la forma preferida en Quarkus. Si usas estas propiedades, puedes dejar la clase CorsConfig vacía.
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:8080,http://localhost:3000,http://localhost:4200
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=*
quarkus.http.cors.access-control-allow-credentials=true